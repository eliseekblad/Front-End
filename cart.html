<body>
       <header class="header">
  <nav class="nav-left">

      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
    </ul>

  <p id="logo">BARE SKIN</p>

  <nav class="nav-right">
    <ul>
      <li><a href="#">About us</a></li>

  <main class="cart-page">
    <h1>Shopping cart</h1>

     <section class="cart-layout">
  
    <div class="cart-items" id="cart-items"></div>

    <aside class="cart-summary">
    <h2>Summary</h2>

      <div class="sum-row">
        <span>Subtotal</span>
        <span id="subtotal"> 0 kr</span>
      </div>

      <div class="sum-row">
        <span>Shipping</span>
        <span>Free</span>
      </div>

      <div class="sum-total">
        <span>Total</span>
        <span id="total">0 kr</span>
      </div>

      <button class="checkout" type="button">Go to checkout</button>
      </aside>

      

    </section>
  </main>

  <script src="js/script.js"></script>
